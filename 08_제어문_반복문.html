<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>제어문_반복문</title>
    <script>
        /*
            while(조건식){
                조건식이 true일 동안 실행될 코드
            }
            do {
                반복 실행할 코드 // 일단 실행하고 true fasle 판단 즉, 1번은 무조건 실행
            } while(조건식)
        */
    </script>
</head>
<body>
    <h1>while 문</h1>
    <script>
        let dan = 7
        let i = 1

        while(i<=9){
            console.log(`${dan} * ${i} = ${dan * i}`)
        }
    </script>
</body>
