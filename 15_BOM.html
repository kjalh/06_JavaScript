<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BOM</title>

    <script>
        /*
            BOM(Browser Object Model)
            자바스크립트가 브라우저 자체를 제어하고 정보를 얻기 위해 사용하는 객체 모델

            API(Application Programming Interface)
            서로 다른 프로그램이나 시스템이 데이터를 주고받고 기능을 사용할 수 있도록 연결해주는 중간 통로

            1. window 객체
            - 자바스크립트에서 브라우저 창을 대표하는 최상위 객체로, 전역 범위에서 정의된 변수나 함수, 타이머, 팝업, 브라우저 정도 등 대부분의 기능을 포함하고 있음
            - HTML 페이지를 로드하면 브라우저는 자동으로 window 객체를 생성하며, 자바스크립트 코드에서 명시적으로 window를 쓰지 않아도 사용할 수 있음

            2. location 객체
            - 자바스크립트에서 현재 웹 페이지의 URL(주소) 정보를 다루고 제어할 수 있게 해주는  window 객체의 하위 객체
        */
    </script>
</head>
<body>
    <button onclick="reloadPage">페이지 새로고침</button>
    <script>
        function showWindowInfo(){
            console.log("브라우저 이름: ", window.navigator.appName)
            console.log("브라우저 엔진: ", window.navigator.product)
            console.log("사용자 에이전트: ", window.navigator.userAgent)

            console.log("현재 페이지 URL: ", window.location.href)

            console.log("창 너비: ", window.innerWidth)
            console.log("창 높이: ", window.innerHeight)

            window.setTimeout(function(){
                window.alert("3초가 지났습니다.") // window를 지워도 똑같이 나옴
            }, 3000) // 3초가 지나면 호출
        }

        function showLocationInfo(){
            console.log("전체 URL: ", location.href)
            console.log("프로토콜: ", location.protocol)
            console.log("호스트: ", location.host)
            console.log("호스트명: ", location.hostname)
            console.log("포트번호: ", location.port)
            console.log("경로: ", location.pathname)
            console.log("쿼리 문자열: ", location.search)
        }

        function reloadPage(){
            location.reload()

        }

        // showWindowInfo()
        showLocationInfo()

    </script>
    
</body>
</html>
