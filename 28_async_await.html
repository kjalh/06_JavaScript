<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>async / await</title>

    <script>
        /*
            async / await
            - Promise를 기반으로 한 자바스크립트의 비동기 처리 문법으로, 비동기 코드를 동기 코드처럼 읽기 쉽고 직관적으로 작성할 수 있게 함
            - async가 붙은 함수는 항상 Promise를 반환하며, await는 Promise가 처리될 때까지 실행을 일시적으로 기다린 뒤 결과값을 반환받아 다음 코드로 넘어가게 함

                // async 함수는 항상 Promise를 반환
                // await는 Promise 앞에서만 사용 가능
                async function run(){
                    const result = await somePromise()
                    console.log(result)
                }

                // 순차 실행
                // 앞 작업이 끝나야 다음 작업 실행
                async function getData(){
                    const banana = await getBanana()
                    const apple = await getApple()
                    console.log(banana, apple)
                }



    </script>

</head>
<body>
    
</body>
</html>
